spring.application.name=qubaati-system

# ===== Datasource (MySQL) =====
# Adjust the username/password below to match your local MySQL installation.
spring.datasource.url=jdbc:mysql://localhost:3306/qubaati_system?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true


spring.ai.openai.api-key=${OPEN_AI_KEY}

openai.api.key=${OPENAI_API_KEY}
openai.model=${OPENAI_MODEL:gpt-5.4-mini}
