spring.application.name=qubaati-system

# ===== Datasource (MySQL) =====
# Adjust the username/password below to match your local MySQL installation.
spring.datasource.url=jdbc:mysql://localhost:3306/qubaati_system?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true


# ===== OpenAI (Spring AI) =====
# One Spring AI configuration used by BOTH AI services (AiActivityService + the mission AiService).
# Key from OPENAI_API_KEY; the empty default lets the app boot and the placeholder/fallback path engage when
# no key is set. Model from OPENAI_MODEL (optional override).
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.model=${OPENAI_MODEL:gpt-5.4-mini}

# ===== OpenAI (optional) =====
# Set OPENAI_API_KEY in your environment to enable AI-powered summaries.
# If the variable is absent or blank the endpoints fall back to rule-based Arabic analysis.
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
