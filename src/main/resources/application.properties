spring.application.name=qubaati-system

# ===== Datasource (MySQL) =====
# Adjust the username/password below to match your local MySQL installation.
spring.datasource.url=jdbc:mysql://localhost:3306/qubaati_system?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true


# ===== OpenAI (Spring AI) =====
# One Spring AI configuration used by ALL AI services (AiActivityService, the mission AiService, and the
# dashboard OpenAiService/AiAnalysisService). Key from OPENAI_API_KEY; the empty default lets the app boot
# and the placeholder/rule-based fallback path engage when no key is set. Model from OPENAI_MODEL.
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-5.4-mini}

# ===== Moyasar (optional — sandbox) =====
# Set MOYASAR_SECRET_KEY and MOYASAR_PUBLISHABLE_KEY in your environment.
# Secret key is never returned in responses or logged.
moyasar.secret-key=${MOYASAR_SECRET_KEY:}
moyasar.publishable-key=${MOYASAR_PUBLISHABLE_KEY:}
moyasar.api-base-url=${MOYASAR_API_BASE_URL:https://api.moyasar.com/v1}
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ===== Mail (optional) =====
# Set MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM in your environment.
# If MAIL_FROM or the recipient address is blank, sending is skipped silently.
# Credentials are never logged or returned in responses.
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=${MAIL_FROM:}

# ===== n8n Parent Weekly Report (external webhook — Basic Auth) =====
# Production n8n webhook URL + Basic Auth credentials configured in n8n. All blank by default so the app boots
# without the integration; the manual endpoint then returns a clear "not configured" error. Never hardcode real
# credentials here — set them via environment variables.
n8n.parent-report-webhook-url=${N8N_PARENT_REPORT_WEBHOOK_URL:}
n8n.basic-auth-username=${N8N_BASIC_AUTH_USERNAME:}
n8n.basic-auth-password=${N8N_BASIC_AUTH_PASSWORD:}

# Feature flags. The scheduler is DISABLED by default to avoid unexpected external calls during normal testing;
# enable it for a demo/production run. Cron defaults to every Monday at 08:00.
n8n.parent-weekly-report.enabled=${N8N_PARENT_WEEKLY_REPORT_ENABLED:true}
n8n.parent-weekly-report.scheduler-enabled=${N8N_PARENT_WEEKLY_REPORT_SCHEDULER_ENABLED:false}
n8n.parent-weekly-report.cron=${N8N_PARENT_WEEKLY_REPORT_CRON:0 0 8 * * MON}

# ===== Security (Spring Security Basic Auth) =====
# Bootstrap ADMIN seeded on startup (used to create teachers/parents/students and reach admin endpoints).
# Override via environment variables; the password is BCrypt-hashed and never logged.
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:Admin123!}
app.admin.email=${APP_ADMIN_EMAIL:admin@qubaati.test}
